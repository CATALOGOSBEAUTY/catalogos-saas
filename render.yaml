services:
  - type: web
    name: catalogos-saas-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run build --workspace backend
    startCommand: npm run start --workspace backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_PROVIDER
        value: supabase
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
